name: Pella Renew

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ 安装依赖（关键）
      - name: 📦 Install dependencies
        run: npm install playwright

      # ✅ 安装浏览器（关键中的关键）
      - name: 🌐 Install browsers
        run: npx playwright install --with-deps

      # ✅ 运行脚本
      - name: 🚀 Run script
        run: node renew-playwright.js
        env:
          ACCOUNT_JSON: ${{ secrets.ACCOUNT_JSON }}
